<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Pro Calculator</title>

<style>
:root {
  --bg: #f5f5f5;
  --card: #ffffff;
  --text: #111;
  --btn: #e0e0e0;
  --accent: #007aff;
}

/* 🌙 Neon Dark Mode */
body.dark {
  --bg: #0a0a0a;
  --card: #111;
  --text: #00f2ff;
  --btn: #1a1a1a;
  --accent: #00f2ff;
}

/* BASE */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  background: var(--bg);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  transition: 0.3s;
}

/* CARD */
.calculator {
  width: 340px;
  padding: 20px;
  border-radius: 25px;
  background: var(--card);
  transition: 0.3s;
}

/* Neon Glow Only in Dark */
body.dark .calculator {
  box-shadow:
    0 0 20px #00f2ff,
    inset 0 0 25px rgba(0,255,255,0.2);
}

/* TOP BAR */
.top-bar {
  display: flex;
  justify-content: space-between;
  margin-bottom: 10px;
}

.toggle {
  cursor: pointer;
  padding: 6px 12px;
  border-radius: 10px;
  background: var(--btn);
  color: var(--text);
  font-size: 14px;
}

/* DISPLAY */
.display {
  width: 100%;
  height: 70px;
  margin-bottom: 15px;
  border-radius: 15px;
  border: none;
  padding: 10px;
  font-size: 26px;
  text-align: right;
  background: var(--btn);
  color: var(--text);
}

/* Neon display glow */
body.dark .display {
  box-shadow: inset 0 0 10px #00f2ff;
}

/* BUTTONS */
.buttons {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
}

button {
  height: 60px;
  border: none;
  border-radius: 12px;
  font-size: 18px;
  cursor: pointer;
  background: var(--btn);
  color: var(--text);
  transition: 0.2s;
}

/* Hover */
button:hover {
  transform: scale(1.05);
}

/* Neon hover glow */
body.dark button:hover {
  background: #00f2ff;
  color: black;
  box-shadow: 0 0 10px #00f2ff;
}

/* Operators */
.operator {
  background: var(--accent);
  color: white;
}

/* Equal */
.equal {
  grid-column: span 4;
  background: var(--accent);
  color: white;
  font-size: 20px;
}

/* Clear */
.clear {
  background: #ff4d4d;
  color: white;
}
</style>
</head>

<body class="dark">

<div class="calculator">

  <div class="top-bar">
    <div class="toggle" onclick="toggleTheme()">🌙 Neon / ☀️ Light</div>
  </div>

  <input type="text" id="display" class="display" readonly>

  <div class="buttons">
    <button class="clear" onclick="clearDisplay()">C</button>
    <button onclick="deleteLast()">⌫</button>
    <button onclick="append('(')">(</button>
    <button onclick="append(')')">)</button>

    <button onclick="append('sin(')">sin</button>
    <button onclick="append('cos(')">cos</button>
    <button onclick="append('tan(')">tan</button>
    <button class="operator" onclick="append('/')">÷</button>

    <button onclick="append('7')">7</button>
    <button onclick="append('8')">8</button>
    <button onclick="append('9')">9</button>
    <button class="operator" onclick="append('*')">×</button>

    <button onclick="append('4')">4</button>
    <button onclick="append('5')">5</button>
    <button onclick="append('6')">6</button>
    <button class="operator" onclick="append('-')">−</button>

    <button onclick="append('1')">1</button>
    <button onclick="append('2')">2</button>
    <button onclick="append('3')">3</button>
    <button class="operator" onclick="append('+')">+</button>

    <button onclick="append('0')">0</button>
    <button onclick="append('.')">.</button>
    <button onclick="append('log(')">log</button>
    <button onclick="append('sqrt(')">√</button>

    <button class="equal" onclick="calculate()">=</button>
  </div>

</div>

<script>
const display = document.getElementById("display");

function append(val) {
  display.value += val;
}

function clearDisplay() {
  display.value = "";
}

function deleteLast() {
  display.value = display.value.slice(0, -1);
}

function calculate() {
  try {
    let exp = display.value;

    exp = exp
      .replace(/sin\(/g, "Math.sin(")
      .replace(/cos\(/g, "Math.cos(")
      .replace(/tan\(/g, "Math.tan(")
      .replace(/log\(/g, "Math.log10(")
      .replace(/sqrt\(/g, "Math.sqrt(");

    display.value = Function('"use strict";return (' + exp + ')')();
  } catch {
    display.value = "Error";
  }
}

function toggleTheme() {
  document.body.classList.toggle("dark");
}
</script>

</body>
</html>
